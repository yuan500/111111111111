name: Build APK

# Ubuntu 22.04 + Buildozer 打包
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip python3-dev python3-venv \
            openjdk-17-jdk \
            autoconf automake libtool cmake pkg-config \
            libffi-dev libssl-dev zlib1g-dev \
            libltdl-dev libncurses-dev git zip unzip

      - name: Install buildozer
        run: |
          pip install --upgrade pip setuptools
          pip install buildozer cython virtualenv

      - name: Debug info
        run: |
          echo "=== Python ==="
          python3 --version
          echo "=== Java ==="
          java -version 2>&1 || true
          echo "=== Buildozer ==="
          buildozer --version 2>&1 || true
          echo "=== Files ==="
          ls -la mobile/

      - name: Build APK
        working-directory: mobile
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log

      - name: List outputs
        if: always()
        run: |
          echo "=== bin/ ==="
          ls -la mobile/bin/ 2>/dev/null || echo "No bin directory"
          echo "=== .buildozer ==="
          ls -la mobile/.buildozer/ 2>/dev/null || echo "No .buildozer directory"

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TRC20-算力分配
          path: mobile/bin/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: mobile/build.log
