name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk autoconf automake libtool cmake pkg-config \
            libffi-dev libssl-dev python3-dev zlib1g-dev libltdl-dev libncurses5-dev git zip unzip

      - name: Install buildozer
        run: pip install --upgrade buildozer cython virtualenv

      - name: Build APK
        working-directory: mobile
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TRC20-算力分配
          path: mobile/bin/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: mobile/build.log
